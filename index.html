<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Pass - Daily Simple</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 10px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .card { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #333; color: white; }
        .btn { padding: 10px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; margin: 2px; }
        .btn-blue { background: #1a73e8; color: white; }
        .btn-red { background: #d93025; color: white; }
        .btn-green { background: #1e8e3e; color: white; }
        .hidden { display: none; }
        #alert-bar { position: fixed; top: 0; left: 0; width: 100%; background: #d93025; color: white; text-align: center; padding: 15px; display: none; font-size: 22px; z-index: 1000; font-weight: bold; }
    </style>
</head>
<body>

<audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
<div id="alert-bar"></div>

<div class="container">
    <div id="login-section">
        <h2>Login</h2>
        <input type="password" id="pass-input" placeholder="Password">
        <button class="btn btn-blue" onclick="doLogin()">Login</button>
    </div>

    <div id="admin-panel" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>Admin Panel (Today's Data)</h3>
            <button class="btn btn-red" onclick="logout()">Logout</button>
        </div>
        
        <div class="card">
            <button class="btn btn-green" onclick="downloadTodayCSV()">Download Today's Excel</button>
            <div id="analytics-box"></div>
        </div>

        <div class="card">
            <h4>Manage Students</h4>
            <input id="nr" placeholder="Roll" style="width:50px">
            <input id="nn" placeholder="Name">
            <button class="btn btn-blue" onclick="addS()">Add</button>
            <table id="list-table">
                <thead><tr><th>Roll</th><th>Name</th><th>Action</th></tr></thead>
                <tbody id="list-body"></tbody>
            </table>
        </div>
    </div>

    <div id="class-panel" class="hidden">
        <div style="display:flex; justify-content:space-between;">
            <h3>Classroom Dashboard</h3>
            <button class="btn btn-red" onclick="logout()">Logout</button>
        </div>
        <table>
            <thead><tr><th>Roll</th><th>Name</th><th>Action</th></tr></thead>
            <tbody id="class-rows"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCjqb8BE0BBxu6o4MVUC-fbNSO4o7hr4Us",
        authDomain: "class-pass-bdf84.firebaseapp.com",
        databaseURL: "https://class-pass-bdf84-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "class-pass-bdf84",
        storageBucket: "class-pass-bdf84.firebasestorage.app",
        messagingSenderId: "536916373219",
        appId: "1:536916373219:web:59a9035999cc6684f6dfd6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function doLogin() {
        const id = document.getElementById('pass-input').value;
        if(id === "ADMIN123") { localStorage.setItem('user', 'ADMIN'); location.reload(); }
        else { localStorage.setItem('user', 'CLASS'); location.reload(); }
    }

    function logout() { localStorage.removeItem('user'); location.reload(); }

    window.onload = () => {
        const user = localStorage.getItem('user');
        if(user === 'ADMIN') {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            renderAdmin();
        } else if(user === 'CLASS') {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('class-panel').classList.remove('hidden');
            renderClass();
        }
    };

    function renderClass() {
        db.ref('students').on('value', s => {
            let h = '';
            s.forEach(c => {
                const v = c.val();
                h += `<tr><td>${v.roll}</td><td><b>${v.name}</b></td>
                <td><button class="btn ${v.status === 'IN' ? 'btn-red' : 'btn-blue'}" onclick="toggleStatus('${c.key}','${v.status}','${v.name}','${v.roll}')">${v.status === 'IN' ? 'OUT' : 'IN'}</button></td></tr>`;
            });
            document.getElementById('class-rows').innerHTML = h;
        });
    }

    function toggleStatus(key, status, name, roll) {
        const next = status === 'IN' ? 'OUT' : 'IN';
        const now = Date.now();
        db.ref('students/' + key).update({ status: next });
        db.ref('logs').push({ name, roll, action: next, timestamp: now, timeStr: new Date().toLocaleTimeString() });
        if(next === 'OUT') db.ref('alerts').set({ msg: name + " is OUT", t: now });
    }

    function renderAdmin() {
        // Student List
        db.ref('students').on('value', s => {
            let h = '';
            s.forEach(c => {
                h += `<tr><td>${c.val().roll}</td><td>${c.val().name}</td><td><button onclick="db.ref('students/${c.key}').remove()">Delete</button></td></tr>`;
            });
            document.getElementById('list-body').innerHTML = h;
        });

        // Today's Ranking
        db.ref('logs').on('value', s => {
            const today = new Date().toISOString().split('T')[0];
            let summary = {};
            s.forEach(child => {
                const v = child.val();
                const logDate = new Date(v.timestamp).toISOString().split('T')[0];
                if(logDate === today && v.action === 'OUT') {
                    if(!summary[v.roll]) summary[v.roll] = { name: v.name, count: 0 };
                    summary[v.roll].count += 1;
                }
            });
            let sorted = Object.values(summary).sort((a,b) => b.count - a.count);
            let h = '<h4>Today\'s Ranking (by Count)</h4><table><thead><tr><th>Rank</th><th>Name</th><th>Count</th></tr></thead><tbody>';
            sorted.forEach((st, i) => {
                h += `<tr><td>${i+1}</td><td>${st.name}</td><td><b>${st.count} times</b></td></tr>`;
            });
            document.getElementById('analytics-box').innerHTML = h + '</tbody></table>';
        });
    }

    function downloadTodayCSV() {
        const today = new Date().toISOString().split('T')[0];
        db.ref('logs').once('value', s => {
            let csv = "\ufeffDate,Time,Roll,Name,Action\n";
            s.forEach(c => {
                const v = c.val();
                const logDate = new Date(v.timestamp).toISOString().split('T')[0];
                if(logDate === today) {
                    csv += `${logDate},${v.timeStr},${v.roll},${v.name},${v.action}\n`;
                }
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `Report_${today}.csv`;
            a.click();
        });
    }

    function addS() {
        const r = document.getElementById('nr').value; const n = document.getElementById('nn').value;
        if(r && n) db.ref('students').push({ roll: r, name: n, status: 'IN' });
    }

    // Alert Handling
    db.ref('alerts').on('value', s => {
        const d = s.val();
        if(d && (Date.now() - d.t < 10000)) {
            const bar = document.getElementById('alert-bar');
            bar.innerHTML = "🚨 " + d.msg;
            bar.style.display = 'block';
            document.getElementById('alert-sound').play().catch(e => {});
            setTimeout(() => { bar.style.display = 'none'; }, 8000);
        }
    });
</script>
</body>
</html>
