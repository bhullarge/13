<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Pass Pro - Advanced Analytics</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-messaging-compat.js"></script>

    <style>
        :root { --primary: #1a73e8; --danger: #d93025; --success: #1e8e3e; --bg: #f8f9fa; --dark: #202124; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: var(--dark); }
        .container { max-width: 1100px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 15px; background: white; }
        th, td { border: 1px solid #e0e0e0; padding: 12px 8px; text-align: center; }
        th { background: #3c4043; color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background-color: #f1f3f4; }
        .std-name { font-weight: bold; color: #1a73e8; font-size: 16px; }
        
        .rank-badge { display: inline-block; width: 25px; height: 25px; line-height: 25px; border-radius: 50%; background: #5f6368; color: white; font-weight: bold; }
        .rank-1 { background: #d93025; transform: scale(1.1); } /* ਸਭ ਤੋਂ ਉੱਪਰ ਵਾਲਾ ਰੰਗ */
        
        button { cursor: pointer; border-radius: 6px; border: none; font-weight: bold; padding: 10px 20px; transition: 0.3s; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-red { background: var(--danger); color: white; }
        
        .card { background: #ffffff; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #dadce0; border-left: 6px solid var(--primary); }
        .filter-box { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-top: 10px; }
        input { padding: 10px; border: 1px solid #dadce0; border-radius: 4px; font-size: 14px; }
        
        .hidden { display: none; }
        #notify-bar { position: fixed; top: 20px; right: 20px; background: #202124; color: white; padding: 15px 25px; border-radius: 8px; display: none; z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.3); border-left: 5px solid #d93025; font-weight: bold; }
    </style>
</head>
<body>

<div id="notify-bar"></div>

<div class="container">
    <div id="login-section">
        <h2 style="color:var(--primary); text-align:center;">Class Pass Pro Login</h2>
        <div style="max-width:300px; margin:auto; display:flex; flex-direction:column; gap:10px;">
            <input type="password" id="pass-input" placeholder="Enter Admin/Class ID">
            <button class="btn-blue" onclick="doLogin()">Login</button>
        </div>
    </div>

    <div id="admin-panel" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; flex-wrap:wrap; gap:10px;">
            <div>
                <button class="btn-blue" onclick="view('logs')">Analytics (Live)</button>
                <button style="background:#5f6368; color:white" onclick="view('list')">Manage Students</button>
            </div>
            <button class="btn-red" onclick="logout()" style="padding:5px 15px">Logout</button>
        </div>
        <div id="admin-display"></div>
    </div>

    <div id="class-panel" class="hidden">
        <div style="display:flex; justify-content: space-between; align-items: center; background:#e8f0fe; padding:10px; border-radius:8px;">
            <h3 style="margin:0; color:#1967d2;">Dashboard (Classroom Mode)</h3>
            <button onclick="logout()" class="btn-red" style="padding:5px 15px">Logout</button>
        </div>
        <table>
            <thead><tr><th>Roll No</th><th>Student Name</th><th>Action</th></tr></thead>
            <tbody id="class-rows"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCjqb8BE0BBxu6o4MVUC-fbNSO4o7hr4Us",
        authDomain: "class-pass-bdf84.firebaseapp.com",
        databaseURL: "https://class-pass-bdf84-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "class-pass-bdf84",
        storageBucket: "class-pass-bdf84.firebasestorage.app",
        messagingSenderId: "536916373219",
        appId: "1:536916373219:web:59a9035999cc6684f6dfd6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function doLogin() {
        const id = document.getElementById('pass-input').value;
        if(id === "ADMIN123") { localStorage.setItem('user', 'ADMIN'); location.reload(); }
        else {
            db.ref('config/classID').once('value', s => {
                if(id === (s.val() || "CLASS10")) { localStorage.setItem('user', 'CLASS'); location.reload(); }
                else alert("Invalid ID!");
            });
        }
    }

    function logout() { localStorage.removeItem('user'); location.reload(); }

    window.onload = () => {
        const user = localStorage.getItem('user');
        if(user === 'ADMIN') {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            view('logs');
        } else if(user === 'CLASS') {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('class-panel').classList.remove('hidden');
            renderClass();
        }
    };

    function renderClass() {
        db.ref('students').on('value', s => {
            let h = '';
            s.forEach(c => {
                const v = c.val();
                const bCls = v.status === 'IN' ? 'btn-red' : 'btn-blue';
                const bTxt = v.status === 'IN' ? 'Go Out (ਬਾਹਰ)' : 'Come In (ਅੰਦਰ)';
                h += `<tr><td>${v.roll}</td><td class="std-name">${v.name}</td>
                <td><button class="${bCls}" onclick="toggleStatus('${c.key}','${v.status}','${v.name}','${v.roll}')">${bTxt}</button></td></tr>`;
            });
            document.getElementById('class-rows').innerHTML = h;
        });
    }

    function toggleStatus(key, status, name, roll) {
        const next = status === 'IN' ? 'OUT' : 'IN';
        const now = Date.now();
        db.ref('students/' + key).update({ status: next, lastChange: now });
        db.ref('logs').push({ name, roll, action: next, timestamp: now, timeStr: new Date().toLocaleTimeString() });
        if(next === 'OUT') {
            db.ref('alerts').set({ msg: name + " ਕਲਾਸ ਤੋਂ ਬਾਹਰ ਗਿਆ ਹੈ!", t: now });
        }
    }

    function formatTime(ms) {
        let totalSecs = Math.floor(ms / 1000);
        let mins = Math.floor(totalSecs / 60);
        let secs = totalSecs % 60;
        return `${mins} ਮਿੰਟ ${secs} ਸਕਿੰਟ`;
    }

    function view(mode) {
        const area = document.getElementById('admin-display');
        if(mode === 'list') {
            area.innerHTML = `
            <div class="card">
                <h4>Add Student / Settings</h4>
                <div class="filter-box">
                    <input id="nr" placeholder="Roll No" style="width:80px">
                    <input id="nn" placeholder="Student Name">
                    <button class="btn-blue" onclick="addS()">Add Student</button>
                </div>
            </div>
            <table id="list-t"><thead><tr><th>Roll</th><th>Name</th><th>Action</th></tr></thead><tbody id="list-b"></tbody></table>`;
            db.ref('students').on('value', s => {
                let h = '';
                s.forEach(c => {
                    h += `<tr><td>${c.val().roll}</td><td class="std-name">${c.val().name}</td>
                    <td><button style="color:red" onclick="db.ref('students/${c.key}').remove()">Delete</button></td></tr>`;
                });
                document.getElementById('list-b').innerHTML = h;
            });
        } else {
            area.innerHTML = `
            <div class="card">
                <h4>ਰਿਪੋਰਟ ਅਤੇ ਫਿਲਟਰ (Advanced Excel)</h4>
                <div class="filter-box">
                    <input type="date" id="filter-date">
                    <input type="text" id="filter-name" placeholder="ਨਾਮ ਜਾਂ ਰੋਲ ਨੰਬਰ">
                    <button class="btn-orange" onclick="downloadAdvancedCSV()">Export Detailed Excel</button>
                </div>
            </div>
            <div id="analytics-table">ਲੋਡ ਹੋ ਰਿਹਾ ਹੈ...</div>`;
            renderAnalytics();
        }
    }

    function renderAnalytics() {
        db.ref('logs').on('value', s => {
            let logs = []; s.forEach(c => logs.push(c.val()));
            let summary = {};
            
            logs.forEach(l => {
                if(!summary[l.roll]) summary[l.roll] = { name: l.name, roll: l.roll, totalMs: 0, lastOut: null };
                if(l.action === 'OUT') summary[l.roll].lastOut = l.timestamp;
                else if(l.action === 'IN' && summary[l.roll].lastOut) {
                    summary[l.roll].totalMs += (l.timestamp - summary[l.roll].lastOut);
                    summary[l.roll].lastOut = null;
                }
            });

            let sorted = Object.values(summary).sort((a,b) => b.totalMs - a.totalMs);
            let h = `<table><thead><tr><th>Rank</th><th>Name</th><th>Total Duration (ਬਾਹਰ ਰਹਿਣ ਦਾ ਸਮਾਂ)</th></tr></thead><tbody>`;
            sorted.forEach((st, i) => {
                const rankCls = i === 0 ? 'rank-1' : '';
                h += `<tr>
                    <td><span class="rank-badge ${rankCls}">${i+1}</span></td>
                    <td class="std-name">${st.name}</td>
                    <td style="font-weight:bold; color:#d93025">${formatTime(st.totalMs)}</td>
                </tr>`;
            });
            document.getElementById('analytics-table').innerHTML = h + `</tbody></table>`;
        });
    }

    function addS() {
        const r = document.getElementById('nr').value;
        const n = document.getElementById('nn').value;
        if(r && n) db.ref('students').push({ roll: r, name: n, status: 'IN', lastChange: Date.now() });
    }

    async function downloadAdvancedCSV() {
        const fDate = document.getElementById('filter-date').value;
        const fName = document.getElementById('filter-name').value.toLowerCase();

        db.ref('logs').once('value', s => {
            let csv = "\ufeffDate,Time,Roll No,Student Name,Action\n";
            s.forEach(c => {
                const v = c.val();
                const d = new Date(v.timestamp).toISOString().split('T')[0];
                if((!fDate || d === fDate) && (!fName || v.name.toLowerCase().includes(fName) || v.roll.toString().includes(fName))) {
                    csv += `${new Date(v.timestamp).toLocaleDateString()},${v.timeStr},${v.roll},${v.name},${v.action}\n`;
                }
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'Detailed_Class_Report.csv'; a.click();
        });
    }

    // Live Alert System
    db.ref('alerts').on('value', s => {
        const d = s.val();
        if(d && (Date.now() - d.t < 10000)) {
            const b = document.getElementById('notify-bar');
            b.innerHTML = "🚨 " + d.msg;
            b.style.display = 'block';
            setTimeout(() => b.style.display='none', 8000);
        }
    });

    // Notification Permission
    const messaging = firebase.messaging();
    function requestPermission() {
        Notification.requestPermission().then(p => {
            if (p === 'granted') {
                messaging.getToken({ vapidKey: 'BJWwvO98z1vOnxXJKKA_9JPPU07MWVa8LNB-ejarhI6QCxSfc2gWGDwho3ttd48JrBYJHN0ZQvfIhBlfPHRT3mI' })
                .then(token => console.log("Token Ready"));
            }
        });
    }
    if (localStorage.getItem('user') === 'ADMIN') requestPermission();
</script>
</body>
</html>
